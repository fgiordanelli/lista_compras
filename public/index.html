<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#102f3d">
  <title>Salvatore — Compras do Dia</title>
  <style>
:root {
  --navy:#102f3d;
  --navy2:#17495e;
  --cream:#f7f2e8;
  --paper:#fffdf8;
  --text:#1f2a2f;
  --muted:#64727a;
  --line:#d9d1c4;
  --soft:#f3eee4;
  --soft-blue:#e7eeee;
  --gold:#8b6a2d;
  --shadow:0 8px 28px rgba(16,47,61,.12);
  --whatsapp:#1fa855;
  --danger:#a33a35;
}

* { box-sizing:border-box; }

html {
  -webkit-text-size-adjust:100%;
  scroll-behavior:smooth;
}

body {
  margin:0;
  min-width:320px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--cream);
  color:var(--text);
}

header {
  position:sticky;
  top:0;
  z-index:40;
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  color:white;
  padding:14px max(14px, env(safe-area-inset-left)) 12px;
  box-shadow:var(--shadow);
}

.brand {
  font-family:Georgia,serif;
  font-size:clamp(25px,4vw,30px);
  line-height:1.05;
}

.sub {
  margin-top:3px;
  font-size:13px;
  opacity:.84;
}

main {
  width:min(1180px,100%);
  margin:auto;
  padding:14px 13px 122px;
}

input,select,button { font:inherit; }

input,select {
  min-height:44px;
  border:1px solid var(--line);
  border-radius:11px;
  background:white;
  padding:9px 10px;
  color:var(--text);
}

input:focus,select:focus,button:focus-visible {
  outline:3px solid rgba(23,73,94,.22);
  outline-offset:1px;
}

button {
  min-height:44px;
  border:0;
  border-radius:11px;
  padding:9px 12px;
  cursor:pointer;
  font-weight:800;
  touch-action:manipulation;
}

.topline {
  display:grid;
  grid-template-columns:180px minmax(240px,1fr);
  gap:9px;
  margin-bottom:11px;
}

.tabs {
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:7px;
  margin-bottom:12px;
}

.tab {
  min-width:0;
  border:1px solid #cfd9db;
  background:var(--soft-blue);
  color:var(--navy);
  padding:10px 7px;
  white-space:nowrap;
}

.tab.active {
  background:var(--navy);
  color:white;
  border-color:var(--navy);
  box-shadow:0 4px 13px rgba(16,47,61,.2);
}

.tab-count {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:21px;
  height:21px;
  margin-left:4px;
  padding:0 5px;
  border-radius:999px;
  background:white;
  color:var(--navy);
  font-size:11px;
}

.panel {
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:17px;
  background:var(--paper);
  box-shadow:var(--shadow);
}

.panel h2 {
  margin:0;
  padding:14px 15px;
  border-bottom:1px solid var(--line);
  color:var(--navy);
  font-size:19px;
}

.category-tabs {
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  padding:11px 13px;
  border-bottom:1px solid var(--line);
  background:#f5f1e8;
}

.category-tab {
  flex:0 0 auto;
  min-height:40px;
  border:1px solid #d1c9ba;
  border-radius:999px;
  background:white;
  color:var(--navy);
  padding:8px 12px;
  font-size:12px;
  font-weight:850;
  white-space:nowrap;
}

.category-tab.active {
  background:var(--navy);
  border-color:var(--navy);
  color:white;
}

.category-count {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:20px;
  height:20px;
  margin-left:5px;
  padding:0 5px;
  border-radius:999px;
  background:#e6edee;
  color:var(--navy);
  font-size:10px;
  font-weight:900;
}

.category-tab.active .category-count {
  background:white;
  color:var(--navy);
}

.hint {
  margin:0;
  padding:10px 15px;
  border-bottom:1px solid var(--line);
  background:#faf7f0;
  color:var(--muted);
  font-size:13px;
}

.status {
  padding:9px 15px;
  border-bottom:1px solid var(--line);
  color:var(--muted);
  font-size:12px;
}

.status.error { color:var(--danger); }

.list {
  margin:0;
  padding:0;
  list-style:none;
}

.category-header {
  padding:10px 13px;
  border-bottom:1px solid #d6dfe0;
  background:var(--soft-blue);
  color:var(--navy);
  font-size:12px;
  font-weight:900;
  letter-spacing:.45px;
  text-transform:uppercase;
}

.item {
  display:grid;
  grid-template-columns:minmax(230px,1fr) 132px 132px 86px 138px;
  gap:9px;
  align-items:stretch;
  padding:11px 13px;
  border-bottom:1px solid #ece6dc;
}

.item:last-child { border-bottom:0; }

.item-main {
  display:flex;
  align-items:center;
  min-width:0;
  padding:4px 2px;
}

.name {
  overflow-wrap:anywhere;
  font-weight:760;
  line-height:1.25;
}

.data-box {
  display:flex;
  min-width:0;
  min-height:48px;
  flex-direction:column;
  justify-content:center;
  padding:6px 9px;
  border:1px solid #d6cfbf;
  border-radius:11px;
  background:var(--soft);
  color:#5f4a26;
  font-weight:800;
}

.data-label {
  display:block;
  margin-bottom:3px;
  color:#857452;
  font-size:9px;
  font-weight:900;
  letter-spacing:.35px;
  line-height:1.1;
  text-transform:uppercase;
}

.current-box {
  background:white;
  color:var(--text);
}

.qty {
  width:100%;
  min-height:29px;
  border:0;
  border-radius:0;
  background:transparent;
  padding:0;
  font-size:16px;
  font-weight:800;
}

.qty:focus {
  outline:0;
  box-shadow:none;
}

.unit-box {
  align-items:center;
  text-align:center;
}

.cost-box {
  background:#f7f1df;
  color:var(--gold);
}

.cost-value {
  line-height:1.2;
  overflow-wrap:anywhere;
}

.empty {
  padding:30px 16px;
  color:var(--muted);
  text-align:center;
}

.bottom {
  position:fixed;
  right:0;
  bottom:0;
  left:0;
  z-index:50;
  border-top:1px solid var(--line);
  background:rgba(247,242,232,.97);
  padding:9px 13px calc(9px + env(safe-area-inset-bottom));
  backdrop-filter:blur(10px);
}

.bottom-inner {
  display:grid;
  width:min(1180px,100%);
  margin:auto;
  gap:7px;
}

.estimated-total {
  color:var(--navy);
  font-size:13px;
  font-weight:850;
  text-align:center;
}

.estimated-total small {
  color:var(--muted);
  font-weight:600;
}

.whatsapp {
  width:100%;
  min-height:52px;
  border-radius:13px;
  background:var(--whatsapp);
  color:white;
  font-size:16px;
  box-shadow:0 5px 15px rgba(31,168,85,.24);
}

/* Tablet: o nome ocupa toda a primeira linha e os dados ficam amplos abaixo. */
@media (min-width:601px) and (max-width:980px) {
  main { padding-right:16px; padding-left:16px; }

  .tabs {
    display:flex;
    overflow-x:auto;
    gap:8px;
    padding-bottom:3px;
    scrollbar-width:thin;
    -webkit-overflow-scrolling:touch;
  }

  .tab { flex:0 0 145px; }

  .category-tabs {
    flex-wrap:nowrap;
    overflow-x:auto;
    scrollbar-width:thin;
    -webkit-overflow-scrolling:touch;
  }

  .item {
    grid-template-columns:repeat(4,minmax(0,1fr));
    margin:9px 11px;
    border:1px solid #e4dccf;
    border-radius:14px;
    background:white;
    box-shadow:0 3px 12px rgba(16,47,61,.06);
  }

  .item-main {
    grid-column:1/-1;
    padding-bottom:2px;
    font-size:17px;
  }
}

/* Celular: cards em duas colunas, alvos grandes e abas com rolagem. */
@media (max-width:600px) {
  header { padding-top:12px; }

  main {
    padding:11px 8px 128px;
  }

  .topline {
    grid-template-columns:1fr;
    gap:8px;
  }

  .tabs {
    display:flex;
    overflow-x:auto;
    gap:7px;
    padding:1px 1px 5px;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }

  .tabs::-webkit-scrollbar,
  .category-tabs::-webkit-scrollbar {
    display:none;
  }

  .tab {
    flex:0 0 auto;
    min-width:128px;
    min-height:46px;
  }

  .panel {
    border-radius:14px;
  }

  .panel h2 {
    padding:13px 12px;
  }

  .category-tabs {
    flex-wrap:nowrap;
    overflow-x:auto;
    padding:9px 9px 10px;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }

  .category-tab {
    min-height:42px;
    padding:9px 12px;
  }

  .hint,.status {
    padding-right:12px;
    padding-left:12px;
  }

  .list {
    padding:7px;
    background:#f8f4ec;
  }

  .category-header {
    margin:2px 1px 7px;
    border:0;
    border-radius:9px;
  }

  .item {
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:7px;
    margin:0 0 8px;
    padding:10px;
    border:1px solid #dfd6c8;
    border-radius:14px;
    background:white;
    box-shadow:0 3px 12px rgba(16,47,61,.06);
  }

  .item:last-child { border-bottom:1px solid #dfd6c8; }

  .item-main {
    grid-column:1/-1;
    min-height:38px;
    padding:2px;
    font-size:16px;
  }

  .data-box {
    min-height:59px;
    padding:7px 8px;
  }

  .qty { font-size:17px; }

  .estimated-total {
    font-size:12px;
  }

  .whatsapp {
    min-height:54px;
    font-size:15px;
  }
}
  </style>
</head>
<body>
<header>
  <div class="brand">Salvatore</div>
  <div class="sub">Casa Italiana · Compras do dia</div>
</header>

<main>
  <div class="topline">
    <input id="date" type="date">
    <input id="search" type="search" placeholder="Buscar em todas as categorias deste setor...">
  </div>

  <nav class="tabs">
    <button class="tab active" data-sector="cozinha">🍝 Cozinha <span class="tab-count" id="count-cozinha">0</span></button>
    <button class="tab" data-sector="pizzaria">🍕 Pizzaria <span class="tab-count" id="count-pizzaria">0</span></button>
    <button class="tab" data-sector="bar">🍸 Bar <span class="tab-count" id="count-bar">0</span></button>
    <button class="tab" data-sector="vinhos">🍷 Vinhos <span class="tab-count" id="count-vinhos">0</span></button>
    <button class="tab" data-sector="salao">🍽️ Salão <span class="tab-count" id="count-salao">0</span></button>
  </nav>

  <section class="panel">
    <h2 id="sectorTitle">🍝 Cozinha</h2>
    <nav id="categoryTabs" class="category-tabs" aria-label="Categorias da aba Cozinha"></nav>
    <p class="hint">Escolha uma categoria e preencha apenas os itens conferidos. Campo vazio é ignorado.</p>
    <div id="status" class="status">Carregando itens...</div>
    <ul id="list" class="list"></ul>
  </section>
</main>

<div class="bottom">
  <div class="bottom-inner">
    <div id="estimatedTotal" class="estimated-total">
      Custo estimado da compra: R$ 0,00
    </div>
    <button id="whatsapp" class="whatsapp">Calcular e enviar no WhatsApp</button>
  </div>
</div>

<script>
const SECTORS = { cozinha:"Cozinha", pizzaria:"Pizzaria", bar:"Bar", vinhos:"Vinhos", salao:"Salão" };
const ICONS = { cozinha:"🍝", pizzaria:"🍕", bar:"🍸", vinhos:"🍷", salao:"🍽️" };
const UNITS = ["un","kg","g","L","ml","pct","cx","fardo","garrafa","lata","pote","maço","dz","rolo","frasco"];

const state = {
  items:[],
  sector:"cozinha",
  category:null,
  categoryBySector:{},
  saving:new Set()
};
const $ = (selector) => document.querySelector(selector);
const dateInput = $("#date");
dateInput.value = new Date().toLocaleDateString("en-CA");

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[char]);
}

function hasUnitCost(item) {
  return item.unitCost !== null &&
    item.unitCost !== undefined &&
    item.unitCost !== "" &&
    Number.isFinite(Number(item.unitCost));
}

function formatCurrency(value) {
  return new Intl.NumberFormat("pt-BR", {
    style:"currency",
    currency:"BRL"
  }).format(Number(value || 0));
}

function purchaseCalculation() {
  return state.items
    .filter(item =>
      item.currentQty !== null &&
      item.currentQty !== undefined &&
      item.currentQty !== ""
    )
    .map(item => {
      const difference = Number(item.minimumQty) - Number(item.currentQty);
      const estimatedCost = hasUnitCost(item)
        ? Math.max(difference, 0) * Number(item.unitCost)
        : null;

      return { ...item, difference, estimatedCost };
    })
    .filter(item => item.difference > 0);
}

function renderEstimatedTotal() {
  const items = purchaseCalculation();
  const knownItems = items.filter(item => item.estimatedCost !== null);
  const total = knownItems.reduce(
    (sum, item) => sum + item.estimatedCost,
    0
  );
  const missing = items.length - knownItems.length;

  $("#estimatedTotal").innerHTML =
    `Custo estimado da compra: ${formatCurrency(total)}` +
    (missing > 0
      ? ` <small>(${missing} item(ns) sem custo cadastrado)</small>`
      : "");
}

function setStatus(message, isError = false) {
  const element = $("#status");
  element.textContent = message;
  element.classList.toggle("error", isError);
}

function categoriesForSector(sector = state.sector) {
  const categories = [];
  const seen = new Set();

  for (const item of state.items) {
    if (item.sector !== sector) continue;
    const category = item.category || "Outros";
    if (seen.has(category)) continue;
    seen.add(category);
    categories.push(category);
  }

  return categories;
}

function ensureSelectedCategory() {
  const categories = categoriesForSector();

  if (!categories.length) {
    state.category = null;
    return;
  }

  const remembered = state.categoryBySector[state.sector];
  const selected = remembered && categories.includes(remembered)
    ? remembered
    : categories[0];

  state.category = selected;
  state.categoryBySector[state.sector] = selected;
}

function renderCategoryTabs() {
  ensureSelectedCategory();

  const categories = categoriesForSector();
  const navigation = $("#categoryTabs");
  navigation.setAttribute(
    "aria-label",
    `Categorias da aba ${SECTORS[state.sector]}`
  );

  if (!categories.length) {
    navigation.innerHTML = "";
    navigation.hidden = true;
    return;
  }

  navigation.hidden = false;
  navigation.innerHTML = categories.map(category => {
    const count = state.items.filter(item =>
      item.sector === state.sector &&
      (item.category || "Outros") === category
    ).length;

    return `
      <button
        type="button"
        class="category-tab ${category === state.category ? "active" : ""}"
        data-category="${escapeHtml(category)}"
      >
        ${escapeHtml(category)}
        <span class="category-count">${count}</span>
      </button>
    `;
  }).join("");

  navigation.querySelectorAll(".category-tab").forEach(button => {
    button.addEventListener("click", () => {
      state.category = button.dataset.category;
      state.categoryBySector[state.sector] = state.category;
      $("#search").value = "";
      render();
    });
  });

  const activeButton = navigation.querySelector(".category-tab.active");
  if (activeButton) {
    activeButton.scrollIntoView({
      behavior:"smooth",
      block:"nearest",
      inline:"center"
    });
  }
}


async function loadItems() {
  setStatus("Carregando itens...");
  const response = await fetch(
    `/api/items?date=${encodeURIComponent(dateInput.value)}&t=${Date.now()}`,
    { cache:"no-store" }
  );
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || "Erro ao carregar.");
  if (data.schemaVersion !== "daily-cmv-v7") {
    throw new Error(
      "Versão antiga da API. Atualize também a pasta functions no GitHub."
    );
  }

  state.items = data.items || [];
  render();
  setStatus(
    `Quantidades salvas automaticamente · D1 ${data.dbMarker || "não identificado"}`
  );
  setStatus("Quantidades salvas automaticamente no banco.");
}

function render() {
  for (const sector of Object.keys(SECTORS)) {
    const count = state.items.filter(item => item.sector === sector).length;
    $(`#count-${sector}`).textContent = count;
  }

  $("#sectorTitle").textContent = `${ICONS[state.sector]} ${SECTORS[state.sector]}`;
  renderCategoryTabs();

  const term = $("#search").value.trim().toLowerCase();
  const sectorItems = state.items.filter(item => item.sector === state.sector);

  // Com busca preenchida, procura em todas as subcategorias do setor.
  // Sem busca, mostra somente a subcategoria selecionada.
  const visible = sectorItems.filter(item => {
    const matchesSearch =
      !term ||
      `${item.name} ${item.category}`.toLowerCase().includes(term);

    const matchesCategory =
      Boolean(term) ||
      (item.category || "Outros") === state.category;

    return matchesSearch && matchesCategory;
  });

  if (!visible.length) {
    $("#list").innerHTML = `<li class="empty">Nenhum item encontrado.</li>`;
  } else if (term) {
    const groups = new Map();

    for (const item of visible) {
      const category = item.category || "Outros";
      if (!groups.has(category)) groups.set(category, []);
      groups.get(category).push(item);
    }

    $("#list").innerHTML = [...groups.entries()].map(([category, categoryItems]) => `
      <li class="category-header">${escapeHtml(category)}</li>
      ${categoryItems.map(item => itemRow(item)).join("")}
    `).join("");
  } else {
    $("#list").innerHTML = visible.map(item => itemRow(item)).join("");
  }

  renderEstimatedTotal();

  document.querySelectorAll(".item").forEach(row => {
    const id = Number(row.dataset.id);
    const input = row.querySelector(".qty");
    let timer;

    input.addEventListener("input", () => {
      clearTimeout(timer);
      timer = setTimeout(() => saveStock(id, input.value, input), 500);
    });

    input.addEventListener("blur", () => {
      clearTimeout(timer);
      saveStock(id, input.value, input);
    });
  });
}

function itemRow(item) {
  const costText = hasUnitCost(item)
    ? `${formatCurrency(item.unitCost)} / ${escapeHtml(item.unit)}`
    : "Não definido";

  return `
    <li class="item" data-id="${item.id}">
      <div class="item-main">
        <span class="name">${escapeHtml(item.name)}</span>
      </div>

      <div class="data-box minimum-box">
        <span class="data-label">Estoque mínimo</span>
        <span>${escapeHtml(item.minimumQty)} ${escapeHtml(item.minimumUnit)}</span>
      </div>

      <label class="data-box current-box">
        <span class="data-label">Estoque atual</span>
        <input class="qty" type="number" min="0" step="0.1"
               inputmode="decimal"
               aria-label="Estoque atual de ${escapeHtml(item.name)}"
               placeholder="Digite"
               value="${item.currentQty === null || item.currentQty === undefined ? "" : escapeHtml(item.currentQty)}">
      </label>

      <div class="data-box unit-box">
        <span class="data-label">Unidade</span>
        <span>${escapeHtml(item.unit)}</span>
      </div>

      <div class="data-box cost-box">
        <span class="data-label">Custo unitário</span>
        <span class="cost-value">${costText}</span>
      </div>
    </li>
  `;
}

async function saveStock(itemId, rawValue, input) {
  const item = state.items.find(candidate => candidate.id === itemId);
  if (!item) return;

  const normalized = rawValue.trim() === "" ? null : Number(rawValue);
  if (normalized !== null && (!Number.isFinite(normalized) || normalized < 0)) {
    setStatus("Digite uma quantidade válida.", true);
    return;
  }

  const oldValue = item.currentQty;
  if (
    (oldValue === null || oldValue === undefined || oldValue === "") &&
    normalized === null
  ) return;
  if (Number(oldValue) === normalized && normalized !== null) return;

  state.saving.add(itemId);
  input.disabled = true;
  setStatus(`Salvando ${item.name}...`);

  try {
    const response = await fetch("/api/stock", {
      method:"POST",
      headers:{
        "content-type":"application/json"
      },
      body:JSON.stringify({
        date:dateInput.value,
        itemId,
        qty:normalized
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || "Erro ao salvar.");

    item.currentQty = data.currentQty;
    renderEstimatedTotal();
    setStatus(`${item.name} salvo.`);
  } catch (error) {
    setStatus(error.message, true);
  } finally {
    state.saving.delete(itemId);
    input.disabled = false;
  }
}

function whatsappText() {
  const filled = purchaseCalculation();
  if (!filled.length) return "";

  const date = dateInput.value.split("-").reverse().join("/");
  const lines = [
    "*SALVATORE — COMPRAS DO DIA*",
    `Data: ${date}`,
    "",
    "Precisamos comprar:"
  ];

  let estimatedTotal = 0;
  let missingCosts = 0;

  for (const sector of Object.keys(SECTORS)) {
    const sectorItems = filled.filter(item => item.sector === sector);
    if (!sectorItems.length) continue;

    lines.push("", `*${SECTORS[sector].toUpperCase()}*`);

    const categoryGroups = new Map();
    for (const item of sectorItems) {
      const category = item.category || "Outros";
      if (!categoryGroups.has(category)) categoryGroups.set(category, []);
      categoryGroups.get(category).push(item);
    }

    for (const [category, categoryItems] of categoryGroups.entries()) {
      lines.push(`_${category}_`);

      for (const item of categoryItems) {
        const difference = Number.isInteger(item.difference)
          ? item.difference
          : Number(item.difference.toFixed(2));

        let costSuffix = "";
        if (item.estimatedCost !== null) {
          estimatedTotal += item.estimatedCost;
          costSuffix = ` — estimado ${formatCurrency(item.estimatedCost)}`;
        } else {
          missingCosts += 1;
        }

        lines.push(
          `• ${item.name}: ${item.minimumQty} ${item.minimumUnit} - ` +
          `${item.currentQty} ${item.unit} = comprar ${difference} ${item.minimumUnit}` +
          costSuffix
        );
      }
    }
  }

  lines.push("", `*CUSTO ESTIMADO TOTAL: ${formatCurrency(estimatedTotal)}*`);

  if (missingCosts > 0) {
    lines.push(
      `_Atenção: ${missingCosts} item(ns) sem custo cadastrado não foram somados._`
    );
  }

  return lines.join("\n");
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    state.sector = tab.dataset.sector;
    state.category = state.categoryBySector[state.sector] || null;

    document.querySelectorAll(".tab").forEach(other =>
      other.classList.toggle("active", other === tab)
    );

    $("#search").value = "";
    render();
  });
});

$("#search").addEventListener("input", render);
dateInput.addEventListener("change", () => loadItems().catch(error => setStatus(error.message, true)));
$("#whatsapp").addEventListener("click", () => {
  const text = whatsappText();
  if (!text) {
    alert("Nenhum item preenchido precisa ser comprado.");
    return;
  }
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
});

loadItems().catch(error => setStatus(error.message, true));
</script>
