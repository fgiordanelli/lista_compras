<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Salvatore — Administrar itens</title>
  <style>
:root {
  --navy:#102f3d;
  --cream:#f7f2e8;
  --paper:#fffdf8;
  --line:#d9d1c4;
  --text:#1f2a2f;
  --muted:#64727a;
  --danger:#a33a35;
  --ok:#267449;
  --shadow:0 6px 22px rgba(16,47,61,.1);
}

* { box-sizing:border-box; }

html { -webkit-text-size-adjust:100%; }

body {
  margin:0;
  min-width:320px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--cream);
  color:var(--text);
}

header {
  background:var(--navy);
  color:white;
  padding:16px max(15px,env(safe-area-inset-left));
}

header h1 {
  margin:0;
  font-family:Georgia,serif;
  font-size:26px;
}

header p {
  margin:4px 0 0;
  font-size:13px;
  opacity:.8;
}

main {
  width:min(1180px,100%);
  margin:auto;
  padding:14px;
}

.card {
  margin-bottom:14px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:15px;
  background:var(--paper);
  box-shadow:var(--shadow);
}

.card h2 {
  margin:0 0 12px;
  color:var(--navy);
  font-size:19px;
}

.auth {
  display:grid;
  grid-template-columns:minmax(180px,1fr) auto;
  gap:8px;
}

input,select,button { font:inherit; }

input,select {
  width:100%;
  min-height:44px;
  border:1px solid var(--line);
  border-radius:10px;
  background:white;
  padding:9px 10px;
}

input:focus,select:focus,button:focus-visible {
  outline:3px solid rgba(23,73,94,.2);
  outline-offset:1px;
}

button {
  min-height:43px;
  border:0;
  border-radius:10px;
  padding:8px 12px;
  cursor:pointer;
  font-weight:800;
  touch-action:manipulation;
}

.primary { background:var(--navy); color:white; }
.secondary { background:#e6edee; color:var(--navy); }
.danger { background:#f2dedb; color:var(--danger); }

.form-grid {
  display:grid;
  grid-template-columns:2fr 1.35fr 1fr 1fr;
  gap:10px;
}

.field {
  display:flex;
  min-width:0;
  flex-direction:column;
  gap:5px;
}

.field.wide { grid-column:span 2; }

.field-label {
  color:var(--muted);
  font-size:11px;
  font-weight:850;
  letter-spacing:.2px;
  text-transform:uppercase;
}

.actions {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}

.status {
  min-height:20px;
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
}

.status.error { color:var(--danger); }
.status.ok { color:var(--ok); }

.table-wrap {
  overflow:auto;
  border:1px solid #e8e0d4;
  border-radius:11px;
}

table {
  width:100%;
  min-width:900px;
  border-collapse:collapse;
  background:white;
}

th,td {
  padding:10px 8px;
  border-bottom:1px solid #e7e0d5;
  text-align:left;
  font-size:13px;
  vertical-align:middle;
}

th {
  position:sticky;
  top:0;
  z-index:1;
  background:#edf2f2;
  color:var(--navy);
}

.row-actions {
  display:flex;
  gap:6px;
}

@media (min-width:601px) and (max-width:950px) {
  main { padding:16px; }
  .form-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .field.wide { grid-column:1/-1; }
}

@media (max-width:600px) {
  main { padding:9px; }

  .card {
    padding:11px;
    border-radius:13px;
  }

  .auth {
    grid-template-columns:1fr;
  }

  .form-grid {
    grid-template-columns:1fr;
  }

  .field.wide {
    grid-column:auto;
  }

  .actions button {
    flex:1 1 140px;
  }

  .table-wrap {
    overflow:visible;
    border:0;
  }

  table {
    min-width:0;
    background:transparent;
  }

  thead { display:none; }

  tbody {
    display:grid;
    gap:9px;
  }

  tr {
    display:block;
    padding:10px;
    border:1px solid #ded5c7;
    border-radius:13px;
    background:white;
    box-shadow:0 3px 10px rgba(16,47,61,.05);
  }

  td {
    display:grid;
    grid-template-columns:42% 58%;
    gap:7px;
    padding:7px 2px;
    border-bottom:1px solid #eee7dd;
    overflow-wrap:anywhere;
  }

  td::before {
    content:attr(data-label);
    color:var(--muted);
    font-size:11px;
    font-weight:850;
    text-transform:uppercase;
  }

  td:last-child { border-bottom:0; }

  .row-actions {
    justify-content:flex-end;
  }
}
  </style>
</head>
<body>
<header>
  <h1>Salvatore</h1>
  <p>Painel administrativo de itens, estoques mínimos e custos · versão preço persistente v5</p>
</header>

<main>
  <section class="card">
    <div class="auth">
      <input id="token" type="password" placeholder="Token administrativo">
      <button id="saveToken" class="secondary">Guardar nesta sessão</button>
    </div>
    <div id="status" class="status">Use o ADMIN_TOKEN configurado no Cloudflare.</div>
  </section>

  <section class="card">
    <h2 id="formTitle">Criar item</h2>
    <div class="form-grid">
      <label class="field wide">
        <span class="field-label">Nome do item</span>
        <input id="name" placeholder="Ex.: Filé mignon">
      </label>

      <label class="field">
        <span class="field-label">Categoria</span>
        <input id="category" placeholder="Categoria" list="categorySuggestions">
      </label>

      <datalist id="categorySuggestions">
        <option value="Hortifruti">
        <option value="Carnes e pescados">
        <option value="Queijos e laticínios">
        <option value="Massas, grãos e secos">
        <option value="Molhos, temperos e bebidas culinárias">
        <option value="Sobremesas">
        <option value="Embalagens e operação">
        <option value="Massas e fermentação">
        <option value="Molhos e hortifruti">
        <option value="Queijos">
        <option value="Frios e coberturas">
        <option value="Temperos e finalizações">
        <option value="Bebidas sem álcool">
        <option value="Cervejas">
        <option value="Vinhos tintos — na carta">
        <option value="Vinhos tintos — fora da carta">
        <option value="Vinhos brancos">
        <option value="Vinhos rosés">
      </datalist>

      <label class="field">
        <span class="field-label">Setor</span>
        <select id="sector">
          <option value="cozinha">Cozinha</option>
          <option value="pizzaria">Pizzaria</option>
          <option value="bar">Bar</option>
          <option value="vinhos">Vinhos</option>
          <option value="salao">Salão</option>
        </select>
      </label>

      <label class="field">
        <span class="field-label">Unidade do estoque</span>
        <input id="unit" placeholder="kg, un, garrafa...">
      </label>

      <label class="field">
        <span class="field-label">Estoque mínimo</span>
        <input id="minimumQty" type="number" min="0" step="0.1" placeholder="0">
      </label>

      <label class="field">
        <span class="field-label">Unidade do mínimo</span>
        <input id="minimumUnit" placeholder="kg, un, garrafa...">
      </label>

      <label class="field">
        <span class="field-label">Custo unitário (R$)</span>
        <input id="unitCost" type="text" inputmode="decimal" autocomplete="off" placeholder="Ex.: 12,50">
      </label>

      <label class="field">
        <span class="field-label">Ordem de exibição</span>
        <input id="sortOrder" type="number" step="1" placeholder="0">
      </label>
    </div>
    <div class="actions">
      <button id="saveItem" class="primary">Criar item</button>
      <button id="cancelEdit" class="secondary" hidden>Cancelar edição</button>
    </div>
  </section>

  <section class="card">
    <h2>Itens cadastrados</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Item</th><th>Setor</th><th>Categoria</th><th>Unidade</th>
            <th>Estoque mínimo</th><th>Custo unitário</th><th>Ordem</th><th>Ações</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
const state = { items:[], editingId:null };
const $ = selector => document.querySelector(selector);

$("#token").value = sessionStorage.getItem("salvatore_admin_token") || "";

function token() { return $("#token").value.trim(); }

function setStatus(message, type = "") {
  const element = $("#status");
  element.textContent = message;
  element.className = `status ${type}`;
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[char]);
}

function formatCurrency(value) {
  return new Intl.NumberFormat("pt-BR", {
    style:"currency",
    currency:"BRL"
  }).format(Number(value || 0));
}

function normalizeMoneyForRequest(value) {
  const raw = String(value ?? "").trim();
  if (!raw) return "";

  let normalized = raw
    .replace(/\s/g, "")
    .replace(/^R\$/i, "");

  if (normalized.includes(",") && normalized.includes(".")) {
    if (normalized.lastIndexOf(",") > normalized.lastIndexOf(".")) {
      normalized = normalized.replace(/\./g, "").replace(",", ".");
    } else {
      normalized = normalized.replace(/,/g, "");
    }
  } else if (normalized.includes(",")) {
    normalized = normalized.replace(",", ".");
  }

  return normalized;
}

function moneyToCents(value) {
  const normalized = normalizeMoneyForRequest(value);
  if (normalized === "") return null;

  const number = Number(normalized);
  if (!Number.isFinite(number) || number < 0) return null;

  return Math.round((number + Number.EPSILON) * 100);
}

function sameItemId(left, right) {
  return Number(left) === Number(right);
}

function mergeSavedItem(savedItem) {
  const index = state.items.findIndex(candidate =>
    sameItemId(candidate.id, savedItem.id)
  );

  if (index >= 0) {
    state.items[index] = {
      ...state.items[index],
      ...savedItem
    };
  } else {
    state.items.push(savedItem);
  }

  renderRows();
}

function sleep(milliseconds) {
  return new Promise(resolve => setTimeout(resolve, milliseconds));
}

async function verifySavedItemWithRetry(savedItem) {
  const expectedCents =
    savedItem.unitCostCents === null ||
    savedItem.unitCostCents === undefined
      ? null
      : Number(savedItem.unitCostCents);

  const delays = [250, 700, 1500, 2500];

  for (const delay of delays) {
    await sleep(delay);

    try {
      const response = await fetch(
        `/api/items?admin=1&t=${Date.now()}`,
        { cache:"no-store" }
      );
      const data = await response.json();

      if (!response.ok || data.schemaVersion !== "price-persistent-v5") {
        continue;
      }

      const loadedItem = (data.items || []).find(candidate =>
        sameItemId(candidate.id, savedItem.id)
      );

      if (!loadedItem) continue;

      const loadedCents =
        loadedItem.unitCostCents === null ||
        loadedItem.unitCostCents === undefined
          ? null
          : Number(loadedItem.unitCostCents);

      if (loadedCents === expectedCents) {
        state.items = data.items || [];
        renderRows();
        return true;
      }
    } catch {
      // A gravação já foi confirmada pela resposta do D1.
      // Esta leitura adicional é apenas para sincronizar a listagem.
    }
  }

  return false;
}

async function loadItems() {
  const response = await fetch(
    `/api/items?admin=1&t=${Date.now()}`,
    { cache:"no-store" }
  );
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || "Erro ao carregar itens.");
  if (data.schemaVersion !== "price-persistent-v5") {
    throw new Error(
      "O frontend novo está usando uma API antiga. Confirme que a pasta functions também foi atualizada no GitHub."
    );
  }

  state.items = data.items || [];
  state.dbMarker = data.dbMarker || null;
  renderRows();

  setStatus(
    `Produção: ${location.origin} · D1: ${state.dbMarker || "não identificado"}`,
    "ok"
  );
}

function renderRows() {
  $("#rows").innerHTML = state.items.map(item => `
    <tr>
      <td data-label="Item"><strong>${escapeHtml(item.name)}</strong></td>
      <td data-label="Setor">${escapeHtml(item.sector)}</td>
      <td data-label="Categoria">${escapeHtml(item.category)}</td>
      <td data-label="Unidade">${escapeHtml(item.unit)}</td>
      <td data-label="Estoque mínimo">${escapeHtml(item.minimumQty)} ${escapeHtml(item.minimumUnit)}</td>
      <td data-label="Custo unitário">${
        item.unitCost === null || item.unitCost === undefined
          ? "Não definido"
          : formatCurrency(item.unitCost)
      }</td>
      <td data-label="Ordem">${escapeHtml(item.sortOrder)}</td>
      <td data-label="Ações">
        <div class="row-actions">
          <button class="secondary edit" data-id="${item.id}">Editar</button>
          <button class="danger remove" data-id="${item.id}">Remover</button>
        </div>
      </td>
    </tr>
  `).join("");

  document.querySelectorAll(".edit").forEach(button =>
    button.addEventListener("click", () => startEdit(Number(button.dataset.id)))
  );
  document.querySelectorAll(".remove").forEach(button =>
    button.addEventListener("click", () => removeItem(Number(button.dataset.id)))
  );
}

function formItem() {
  return {
    name:$("#name").value.trim(),
    category:$("#category").value.trim(),
    sector:$("#sector").value,
    unit:$("#unit").value.trim(),
    minimumQty:$("#minimumQty").value,
    minimumUnit:$("#minimumUnit").value.trim(),
    unitCost:$("#unitCost").value.trim(),
    sortOrder:$("#sortOrder").value || 0
  };
}

function clearForm() {
  state.editingId = null;
  $("#formTitle").textContent = "Criar item";
  $("#saveItem").textContent = "Criar item";
  $("#cancelEdit").hidden = true;
  for (const id of ["name","category","unit","minimumQty","minimumUnit","unitCost","sortOrder"]) {
    $(`#${id}`).value = "";
  }
  $("#sector").value = "cozinha";
}

function startEdit(id) {
  const item = state.items.find(candidate => sameItemId(candidate.id, id));
  if (!item) return;

  state.editingId = id;
  $("#formTitle").textContent = `Editar: ${item.name}`;
  $("#saveItem").textContent = "Salvar alterações";
  $("#cancelEdit").hidden = false;
  $("#name").value = item.name;
  $("#category").value = item.category;
  $("#sector").value = item.sector;
  $("#unit").value = item.unit;
  $("#minimumQty").value = item.minimumQty;
  $("#minimumUnit").value = item.minimumUnit;
  $("#unitCost").value =
    item.unitCost === null || item.unitCost === undefined
      ? ""
      : Number(item.unitCost).toLocaleString("pt-BR", {
          minimumFractionDigits:2,
          maximumFractionDigits:2
        });
  $("#sortOrder").value = item.sortOrder;
  window.scrollTo({ top:0, behavior:"smooth" });
}

async function adminAction(payload) {
  if (!token()) throw new Error("Informe o token administrativo.");

  const response = await fetch("/api/admin", {
    method:"POST",
    headers:{
      "content-type":"application/json",
      "authorization":`Bearer ${token()}`
    },
    body:JSON.stringify(payload),
    cache:"no-store"
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || "Erro ao salvar.");
  return data;
}

async function saveItem() {
  try {
    setStatus("Salvando no D1...");

    const item = formItem();
    const action = state.editingId ? "update" : "create";
    const payload = { action, item };

    if (state.editingId) {
      payload.id = state.editingId;
    }

    const expectedCents = moneyToCents($("#unitCost").value);
    const result = await adminAction(payload);

    if (result.persistenceVersion !== "price-persistent-v5") {
      throw new Error(
        "A função /api/admin ainda é antiga. Atualize também a pasta functions."
      );
    }

    const savedItem = result.item;

    if (
      state.dbMarker &&
      result.dbMarker &&
      state.dbMarker !== result.dbMarker
    ) {
      throw new Error(
        `O painel leu o D1 ${state.dbMarker}, mas tentou salvar no D1 ${result.dbMarker}. ` +
        `Os bindings de Preview e Production estão diferentes.`
      );
    }

    if (!savedItem) {
      throw new Error("O D1 não retornou o item salvo.");
    }

    const savedCents =
      savedItem.unitCostCents === null ||
      savedItem.unitCostCents === undefined
        ? null
        : Number(savedItem.unitCostCents);

    if (savedCents !== expectedCents) {
      throw new Error(
        `O custo retornado pelo D1 foi diferente do digitado. ` +
        `Digitado: ${
          expectedCents === null
            ? "vazio"
            : formatCurrency(expectedCents / 100)
        }; salvo: ${
          savedCents === null
            ? "vazio"
            : formatCurrency(savedCents / 100)
        }.`
      );
    }

    // A resposta da própria gravação já contém o registro lido do D1.
    // Atualizamos a tabela imediatamente, sem depender de uma segunda leitura.
    mergeSavedItem(savedItem);
    clearForm();

    const costMessage =
      savedCents === null
        ? "sem custo cadastrado"
        : `custo ${formatCurrency(savedCents / 100)}`;

    setStatus(
      `${savedItem.name} salvo permanentemente no D1 com ${costMessage}.`,
      "ok"
    );

    // Sincronização silenciosa: algumas leituras imediatamente após a escrita
    // podem ainda trazer a versão anterior. Isso não desfaz o salvamento.
    const synchronized = await verifySavedItemWithRetry(savedItem);

    if (!synchronized) {
      setStatus(
        `${savedItem.name} foi salvo no D1 com ${costMessage}. ` +
        `A tabela local já foi atualizada; a sincronização completa ocorrerá ao recarregar.`,
        "ok"
      );
    }
  } catch (error) {
    setStatus(error.message, "error");
  }
}

async function removeItem(id) {
  const item = state.items.find(candidate => sameItemId(candidate.id, id));
  if (!item || !confirm(`Remover definitivamente "${item.name}"?`)) return;

  try {
    setStatus("Removendo...");
    await adminAction({ action:"delete", id });
    await loadItems();
    setStatus("Item removido do banco.", "ok");
  } catch (error) {
    setStatus(error.message, "error");
  }
}

$("#saveToken").addEventListener("click", () => {
  sessionStorage.setItem("salvatore_admin_token", token());
  setStatus("Token guardado nesta aba do navegador.", "ok");
});
$("#saveItem").addEventListener("click", saveItem);
$("#cancelEdit").addEventListener("click", clearForm);

loadItems().catch(error => setStatus(error.message, "error"));
</script>
</body>
</html>
